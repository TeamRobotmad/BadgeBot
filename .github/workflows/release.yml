name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Read version from tildagon.toml
        id: version
        run: |
          version=$(grep -m1 '^version' tildagon.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether this version was already released
        id: check
        run: |
          if git ls-remote --exit-code --heads origin "release-v${{ steps.version.outputs.version }}" >/dev/null 2>&1 || \
             git ls-remote --exit-code --tags  origin "v${{ steps.version.outputs.version }}"        >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        if: steps.check.outputs.exists == 'false'
        run: pip install mpy-cross

      - name: Build release branch
        if: steps.check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          branch="release-v${version}"

          git checkout -b "$branch"

          python dev/build_release.py --force

          # push release branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release v${version}"
          git push origin "$branch"

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          gh release create "v${version}" \
            --target "release-v${version}" \
            --title "v${version}" \
            --generate-notes
