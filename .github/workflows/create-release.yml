name: Release BadgeBot via GitHub Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3), must match an existing release-vX.Y.Z branch"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine previous version tag
        id: prev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current="v${{ inputs.version }}"

          previous_tag=$(
            { gh release list --limit 1000 --json tagName --jq '.[].tagName'; echo "$current"; } \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -Vu \
              | awk -v cur="$current" '$0==cur{print prev; exit} {prev=$0}'
          )

          echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ inputs.version }}"
          previous_tag="${{ steps.prev.outputs.previous_tag }}"

          notes_args=(--generate-notes)
          if [ -n "${previous_tag}" ]; then
            notes_args+=(--notes-start-tag "${previous_tag}")
          fi

          gh release create "v${version}" \
            --target "release-v${version}" \
            --title "v${version}" \
            "${notes_args[@]}"
